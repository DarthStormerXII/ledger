app = "ledger-axl-worker-placeholder"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[[services]]
  protocol = "tcp"
  internal_port = 9001
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 9001

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

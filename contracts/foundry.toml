[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
galileo = "https://evmrpc-testnet.0g.ai"
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
galileo = { key = "${GALILEO_EXPLORER_API_KEY}", url = "https://chainscan-galileo.0g.ai/api" }
